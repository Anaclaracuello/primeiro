<body>
    <h1>Práticas do HTML</h1>
    <p>Exemplos de formulário, tabela e listas.</p>
    <h3>1. Formulário de Contato</h3>

    <form action>
        <label for="txtNome">Nome Completo:</label><br>
        <input type="text" id="txtNome"><br>
        <label for="txtEmail">Email:</label><br>
        <input type="Email" id="txtEmail"><br>
        <label for="txtMsg">Mensagem:</label><br>
        <textarea id="txtMsg"></textarea><br>
        <label for="txtIdade">Idade:</label><br>
        <input id="txtIdade" type="number" min="1" max="99" placeholder="digite a idade..."></input><br>
        <button type="submit">Enviar Mensagem</button>
    </form>
